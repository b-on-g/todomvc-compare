<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>TodoMVC: Cruzo</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
        }
        body {
            font: 14px "Helvetica Neue", Helvetica, Arial, sans-serif;
            line-height: 1.4em;
            background: #f5f5f5;
            color: #111111;
            min-width: 230px;
            max-width: 550px;
            margin: 0 auto;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-weight: 300;
        }
        .info {
            margin: 65px auto 0;
            color: #4d4d4d;
            font-size: 11px;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
            text-align: center;
        }
        .info p { line-height: 1; }
        .info a { color: inherit; text-decoration: none; font-weight: 400; }
        .info a:hover { text-decoration: underline; }

        todo-app {
            display: block;
            background: #fff;
            margin: 130px 0 40px 0;
            position: relative;
            box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.2), 0 25px 50px 0 rgba(0, 0, 0, 0.1);
        }
        todo-app h1 {
            position: absolute;
            top: -140px;
            width: 100%;
            font-size: 80px;
            font-weight: 200;
            text-align: center;
            color: #b83f45;
            text-rendering: optimizeLegibility;
        }
        todo-app .main {
            position: relative;
            z-index: 2;
            border-top: 1px solid #e6e6e6;
        }
        todo-app .new-todo {
            position: relative;
            margin: 0;
            width: 100%;
            font-size: 24px;
            font-family: inherit;
            font-weight: inherit;
            line-height: 1.4em;
            border: 0;
            color: inherit;
            padding: 16px 16px 16px 60px;
            background: rgba(0, 0, 0, 0.003);
            box-shadow: inset 0 -2px 1px rgba(0, 0, 0, 0.03);
            box-sizing: border-box;
        }
        todo-app .new-todo::placeholder {
            font-style: italic;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.4);
        }
        todo-app .toggle-all {
            width: 1px;
            height: 1px;
            border: none;
            opacity: 0;
            position: absolute;
            right: 100%;
            bottom: 100%;
        }
        todo-app .toggle-all + label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 65px;
            font-size: 0;
            position: absolute;
            top: -65px;
            left: 0;
        }
        todo-app .toggle-all + label:before {
            content: "\276F";
            display: inline-block;
            font-size: 22px;
            color: #949494;
            padding: 10px 27px;
            transform: rotate(90deg);
        }
        todo-app .toggle-all:checked + label:before {
            color: #484848;
        }
        todo-app .todo-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        todo-app .todo-list li {
            display: block;
            position: relative;
            font-size: 24px;
            border-bottom: 1px solid #ededed;
        }
        todo-app .todo-list li:last-child {
            border-bottom: none;
        }
        todo-app .todo-list li.editing .view {
            display: none;
        }
        todo-app .todo-list li.editing .edit {
            display: block;
            width: calc(100% - 43px);
            padding: 12px 16px;
            margin: 0 0 0 43px;
        }
        todo-app .todo-list li .toggle {
            text-align: center;
            width: 40px;
            height: auto;
            position: absolute;
            top: 0;
            bottom: 0;
            margin: auto 0;
            border: none;
            appearance: none;
            opacity: 0;
        }
        todo-app .todo-list li .toggle + label {
            background-image: url("data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2240%22%20height%3D%2240%22%20viewBox%3D%22-10%20-18%20100%20135%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22none%22%20stroke%3D%22%23949494%22%20stroke-width%3D%223%22/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: center left;
            word-break: break-all;
            padding: 15px 15px 15px 60px;
            display: block;
            line-height: 1.2;
            transition: color 0.4s;
            font-weight: 400;
            color: #484848;
        }
        todo-app .todo-list li .toggle:checked + label {
            background-image: url("data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2240%22%20height%3D%2240%22%20viewBox%3D%22-10%20-18%20100%20135%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22none%22%20stroke%3D%22%2359A193%22%20stroke-width%3D%223%22%2F%3E%3Cpath%20fill%3D%22%233EA390%22%20d%3D%22M72%2025L42%2071%2027%2056l-4%204%2020%2020%2034-52z%22%2F%3E%3C%2Fsvg%3E");
            color: #949494;
            text-decoration: line-through;
        }
        todo-app .todo-list li.completed label {
            color: #949494;
            text-decoration: line-through;
        }
        todo-app .todo-list li .destroy {
            display: none;
            position: absolute;
            top: 0;
            right: 10px;
            bottom: 0;
            width: 40px;
            height: 40px;
            margin: auto 0;
            font-size: 30px;
            color: #949494;
            transition: color 0.2s ease-out;
            border: 0;
            background: none;
            cursor: pointer;
            padding: 0;
            appearance: none;
        }
        todo-app .todo-list li .destroy:hover,
        todo-app .todo-list li .destroy:focus {
            color: #c18585;
        }
        todo-app .todo-list li .destroy:after {
            content: "\00D7";
            display: block;
            height: 100%;
            line-height: 1.1;
        }
        todo-app .todo-list li:hover .destroy {
            display: block;
        }
        todo-app .todo-list li .edit {
            display: none;
            position: relative;
            margin: 0;
            width: 100%;
            font-size: 24px;
            font-family: inherit;
            font-weight: inherit;
            line-height: 1.4em;
            color: inherit;
            padding: 6px;
            border: 1px solid #999;
            box-shadow: inset 0 -1px 5px 0 rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
        }
        todo-footer {
            display: block;
            position: relative;
        }
        todo-footer .footer {
            padding: 10px 15px;
            height: 20px;
            text-align: center;
            font-size: 15px;
            border-top: 1px solid #e6e6e6;
            position: relative;
        }
        todo-footer .footer:before {
            content: "";
            position: absolute;
            right: 0;
            bottom: 0;
            left: 0;
            height: 50px;
            overflow: hidden;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.2), 0 8px 0 -3px #f6f6f6,
                0 9px 1px -3px rgba(0, 0, 0, 0.2), 0 16px 0 -6px #f6f6f6,
                0 17px 2px -6px rgba(0, 0, 0, 0.2);
        }
        todo-footer .todo-count {
            float: left;
            text-align: left;
        }
        todo-footer .todo-count strong {
            font-weight: 300;
        }
        todo-footer .filters {
            margin: 0;
            padding: 0;
            list-style: none;
            position: absolute;
            right: 0;
            left: 0;
        }
        todo-footer .filters li {
            display: inline;
        }
        todo-footer .filters li a {
            color: inherit;
            margin: 3px;
            padding: 3px 7px;
            text-decoration: none;
            border: 1px solid transparent;
            border-radius: 3px;
        }
        todo-footer .filters li a:hover {
            border-color: #db7676;
        }
        todo-footer .filters li a.selected {
            border-color: #ce4646;
        }
        todo-footer .clear-completed {
            float: right;
            position: relative;
            line-height: 19px;
            text-decoration: none;
            cursor: pointer;
            border: 0;
            background: none;
            font-size: inherit;
            font-family: inherit;
            color: inherit;
            padding: 0;
            appearance: none;
        }
        todo-footer .clear-completed:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <todo-app></todo-app>
    <footer class="info">
        <p>Double-click to edit a todo</p>
        <p>Written with <a href="https://github.com/MaratBektemirov/cruzo">Cruzo</a></p>
        <p>Part of <a href="http://todomvc.com">TodoMVC</a></p>
    </footer>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
